<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>NarxozEat - Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --red: #C8102E; --dark: #2B2B2B; }
        body { font-family: 'Montserrat', sans-serif; background: #f4f4f4; margin: 0; padding-bottom: 50px; }
        header { background: var(--red); color: white; text-align: center; padding: 30px; }
        .tabs { display: flex; justify-content: center; gap: 10px; margin: 20px; }
        .tab { padding: 10px 20px; cursor: pointer; background: white; border: 2px solid var(--red); border-radius: 5px; font-weight: bold; }
        .active { background: var(--red); color: white; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .hidden { display: none; }
        input, select { width: 100%; padding: 10px; margin: 10px 0; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: var(--red); color: white; border: none; font-weight: bold; cursor: pointer; }
        #status { margin-top: 20px; padding: 10px; display: none; text-align: center; border-radius: 5px; }
    </style>
</head>
<body>
<header><h1>NarxozEat Platform</h1></header>
<div class="tabs">
    <div id="t1" class="tab active" onclick="switchTab('order')">Order Food</div>
    <div id="t2" class="tab" onclick="switchTab('join')">Join Courier Club</div>
</div>
<div class="container">
    <div id="orderForm">
        <h3>Place Pre-order</h3>
        <input type="text" id="oName" placeholder="Full Name">
        <select id="oItem">
            <option value="Matcha (1200 KZT)">Matcha (1200 KZT)</option>
            <option value="Syrniki (1500 KZT)">Syrniki (1500 KZT)</option>
        </select>
        <button onclick="submitOrder()">Order Now</button>
    </div>
    <div id="joinForm" class="hidden">
        <h3>Membership Registration</h3>
        <input type="text" id="mName" placeholder="Full Name">
        <input type="text" id="mId" placeholder="Student ID">
        <button onclick="submitMembership()">Sign Up for Club</button>
    </div>
    <div id="status"></div>
</div>

<script>
    function switchTab(type) {
        document.getElementById('orderForm').classList.toggle('hidden', type !== 'order');
        document.getElementById('joinForm').classList.toggle('hidden', type !== 'join');
        document.getElementById('t1').classList.toggle('active', type === 'order');
        document.getElementById('t2').classList.toggle('active', type === 'join');
    }

    async function postData(url, data) {
        const res = await fetch(url, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(data)
        });
        const result = await res.json();
        const s = document.getElementById('status');
        s.style.display = 'block';
        s.style.background = '#d4edda';
        s.innerHTML = result.message + " ID: #" + result.id;
    }

    function submitOrder() {
        postData('/api/order', { name: document.getElementById('oName').value, item: document.getElementById('oItem').value });
    }

    function submitMembership() {
        postData('/api/membership', { name: document.getElementById('mName').value, studentId: document.getElementById('mId').value });
    }
</script>
</body>
</html>
